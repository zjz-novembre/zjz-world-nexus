<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Settings</title>
    <link rel="stylesheet" href="../assets/extension-theme.css" />
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="shell shell--options">
      <section class="topline">
        <div class="topline__header">
          <h1 class="topline__title">Nexus</h1>
        </div>
      </section>
      <form class="fields" id="settings-form">
        <label class="field">
          <span class="field__label">Server</span>
          <input class="field__input" id="api-base-url" name="api-base-url" type="url" required />
        </label>
        <button class="button button--primary" type="submit">Save</button>
      </form>
      <div class="status-line" id="status-line"></div>
    </main>
    <script type="module" src="./options.js"></script>
  </body>
</html>
